<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatPiller</title>
    <!-- <script defer src="http://localhost:8000/socket.io/socket.io.js"></script> -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script defer src="js/client.js"></script>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="favicon_io/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="favicon_io/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="favicon_io/favicon-16x16.png"
    />
    <link rel="manifest" href="favicon_io/site.webmanifest" />
  </head>
  <body>
    <nav>
      <img class="logo" src="chat_app_logo.webp" alt="ChatPillerLogo" />
      <h1>ChatPiller</h1>
    </nav>
    <div class="join-container" id="join-container">
      <div class="join-box">
        <h2>Join ChatPiller</h2>

        <input type="text" id="nameInp" placeholder="Enter your name" />

        <button id="joinBtn">Join Chat</button>
      </div>
    </div>
    <div class="container">
      <!-- <div class="message right">Shreya: Hello</div>
      <div class="message left">Vidhi: Hello</div> -->
    </div>
    <div class="send">
      <form action="" id="send-container">
        <input disabled type="text" name="messageInp" id="messageInp" />
        <button type="submit" class="btn">Send</button>
      </form>
    </div>
  </body>
</html>
